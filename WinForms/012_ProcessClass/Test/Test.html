<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b2b45);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2.2em;
            color: #00d4ff;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
        }

        .tag {
            margin-top: 20px;
            display: inline-block;
            padding: 6px 12px;
            background: #00d4ff;
            color: #000;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hello C#</h1>
        <p>This is a test for Process Class :)</p>

        <div class="tag">
            HTML + CSS Test Page
        </div>
    </div>

</body>
</html>
